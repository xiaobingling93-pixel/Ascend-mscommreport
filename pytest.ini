[pytest]
# pytest配置文件

# 测试发现模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
# tests/ - 总测试目录
#   st/ - 系统测试 (System Tests)，基于 test_data/标准目录结构 的完整测试
#   ut/ - 单元测试 (Unit Tests)，针对单个函数/类的测试
testpaths = tests

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 标记
markers =
    slow: 慢速测试
    integration: 集成测试
    unit: 单元测试
